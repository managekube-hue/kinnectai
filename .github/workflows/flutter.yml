name: Flutter CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
    - run: cd apps/mobile && flutter pub get
    - run: cd apps/mobile && flutter test

  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
    - run: cd apps/mobile && flutter pub get
    - run: cd apps/mobile && flutter build apk --release

  build-ios:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v3
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
    - run: cd apps/mobile && flutter pub get
    - run: cd apps/mobile && flutter build ios --release --no-codesign

  build-desktop:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
    - run: cd apps/mobile && flutter config --enable-linux-desktop
    - run: cd apps/mobile && flutter pub get
    - run: cd apps/mobile && flutter build linux --release