include: package:flutter_lints/flutter.yaml

# KinnectAI Custom Lint Rules (Addendum 2.0 S1)
# Enforces: no dynamic in models, PhosphorIcons compliance, KinnectColors usage
analyzer:
  errors:
    # Treat missing return as error
    missing_return: error
    # Treat dead code as warning
    dead_code: warning

linter:
  rules:
    # Code quality
    - always_declare_return_types
    - avoid_dynamic_calls
    - avoid_print
    - avoid_relative_lib_imports
    - avoid_type_to_string
    - cancel_subscriptions
    - close_sinks
    - prefer_const_constructors
    - prefer_const_declarations
    - prefer_final_fields
    - prefer_final_locals
    - prefer_single_quotes
    - sort_child_properties_last
    - unawaited_futures
    - unnecessary_await_in_return
    - unnecessary_lambdas
    - use_build_context_synchronously

    # KinnectAI specific rules (enforced via CI grep checks)
    # no_cupertino_icons: enforced via grep -r "CupertinoIcons" check
    # no_hardcoded_colors: enforced via grep for hex color literals
    # no_dynamic_in_models: enforced via grep for "dynamic" in models/
    # phosphor_icons_only: enforced via grep for "Icons." excluding system fallbacks
