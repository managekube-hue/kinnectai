name: kinnectai_app
description: "KinnectAI Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.5
  cupertino_icons: ^1.0.8
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.3
  google_sign_in: ^6.2.2
  flutter_facebook_auth: ^6.0.4
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.3
  video_player: ^2.9.2
  chewie: ^1.8.5
  webview_flutter: ^4.10.0
  url_launcher: ^6.3.1
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7
  shared_preferences: ^2.3.3
  record: ^6.0.0
  just_audio: ^0.9.42
