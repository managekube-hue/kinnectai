  path_provider: ^2.1.5
  device_info_plus: ^11.2.0
  http: ^1.2.2
  crypto: ^3.0.7
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  dio: ^5.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^9.1.5
