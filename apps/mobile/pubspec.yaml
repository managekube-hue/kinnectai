name: kinnectai_app
description: "KinnectAI Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.5
  go_router: ^14.8.1
  phosphor_flutter: ^2.1.0
  cupertino_icons: ^1.0.8
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.3
  google_sign_in: ^6.2.2
  flutter_facebook_auth: ^6.0.4
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.3
  video_player: ^2.11.1
  chewie: ^1.8.5
  webview_flutter: ^4.10.0
  url_launcher: ^6.3.1
  flutter_bloc: ^8.1.6
  hydrated_bloc: ^9.1.5
  equatable: ^2.0.7
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.1.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  workmanager: ^0.6.0
  drift: ^2.25.1
  sqlite3_flutter_libs: ^0.5.32
  record: ^6.0.0
  just_audio: ^0.9.42
  permission_handler: ^11.3.1
  path_provider: ^2.1.5
  device_info_plus: ^11.2.0
  http: ^1.2.2
  google_maps_flutter: ^2.12.0
  qr_flutter: ^4.1.0
  path: ^1.9.1
  crypto: ^3.0.7
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  dio: ^5.9.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  purchases_flutter: ^10.0.2
  libsignal_protocol_dart: ^0.7.0
  cached_network_image: ^3.4.1

  # Marketplace / E-commerce OSS packages
  flutter_stripe: ^12.6.0             # Production Stripe Connect checkout
  dio_smart_retry: ^7.0.1             # Resilient Dio retry interceptor
  infinite_scroll_pagination: ^4.1.0  # Battle-tested paginated lists
  shimmer: ^3.0.0                     # Loading skeleton placeholders
  carousel_slider: ^5.0.0             # Product image carousels
  flutter_rating_bar: ^4.0.1          # Star ratings / reviews
  flutter_slidable: ^3.1.1            # Swipe-to-delete cart items
  badges: ^3.1.2                      # Cart badge count overlay
  collection: ^1.18.0                 # groupBy, sorting utilities
  intl: ^0.19.0                       # Currency formatting
  share_plus: ^10.1.4                 # Share product links
  flutter_staggered_grid_view: ^0.7.0 # Pinterest-style product grid
  image_picker: ^1.1.2                # Product image upload

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^3.0.6
  json_serializable: ^6.9.0
  drift_dev: ^2.25.2
  bloc_test: ^9.1.5
  mocktail: ^1.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
