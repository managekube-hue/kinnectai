services:
  # ─── KinnectAI Feed Service ─────────────────────────────────
  feed-service:
    build:
      context: ./services/go/feed-service
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      NEO4J_URI: bolt://neo4j:7687
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped

  # ─── KinnectAI Kernel Service ─────────────────────────────
  kernel-service:
    build:
      context: ./services/python/kernel-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      NEO4J_URI: bolt://neo4j:7687
      CASSANDRA_HOSTS: cassandra
      KAFKA_BROKERS: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      cassandra:
        condition: service_healthy
    restart: unless-stopped

  # ─── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: kinnect
      POSTGRES_PASSWORD: kinnect_dev_password
      POSTGRES_DB: kinnectai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kinnect -d kinnectai"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Neo4j (biological graph) ────────────────────────────
  neo4j:
    image: neo4j:5.20-community
    environment:
      NEO4J_AUTH: neo4j/kinnect_neo4j_password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ─── Redis (Kin Score cache) ─────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Kafka (DNA ingestion queue) ────────────────────────────
  kafka:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092
    ports:
      - "9092:9092"
    restart: unless-stopped

  # ─── Cassandra (behavioral / event store) ─────────────────────────────────
  cassandra:
    image: cassandra:4.1
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
      - ./migrations/cassandra:/schema:ro
    environment:
      CASSANDRA_CLUSTER_NAME: "kinnectai"
      CASSANDRA_START_RPC: "true"
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
    healthcheck:
      test: ["CMD", "cqlsh", "localhost", "-e", "describe keyspaces"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ─── MinIO (local object storage) ───────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  cassandra_data:
  minio_data:
