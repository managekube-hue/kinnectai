# User Journeys
Primary end-to-end user journeys with branch states, auth gates, and fallback paths.
All journeys trace to PRD §11, §14, §17, §27, §31, §34.

## 1. Onboarding → Line Activation
1. Welcome → Select Auth Provider (Google/FB/Email/Phone/Passkey)
2. OTP/Passkey Verification → JWT issuance → `consent_flags = 0x00`
3. Step 1: Surname → Name Map loads (identity-service) → Bit 0 prompt
4. Step 2: DNA (optional) → Sequencing OAuth / VCF upload → Bit 1 prompt (HIPAA/GINA)
5. Step 3: First Photo → On-device TFLite → Bit 5 prompt (BIPA)
6. Step 4: Invite Kin → Contact sync → ATT prompt fires (iOS) → Bit 7 prompt
7. Step 5: The Line → Redis feed cache → Heartbeat injected → Discovery 1:7 ratio

## 2. Memory Box Seal (ZK Flow)
1. Composer → Record/Upload → Draft auto-save (Drift)
2. Select Trigger → Time Capsule / Milestone / Unspoken / Geofence
3. Unspoken → Steward Selection → Steward Agreement modal (Bit 9) → Awaiting Confirmation
4. Seal CTA → Step-up Auth (biometric/TOTP) → Client DEK generation → AES-256-GCM encrypt
5. Upload encrypted payload → S3 presigned PUT → KMS wrap DEK → POST /v1/memorybox
6. Server returns `201 { memory_id, audit_id }` → `VaultComposerState.sealed`

## 3. Discovery Swipe → Kinnection
1. GET /v1/discovery/weekly → Max 10 cards, KC-ranked
2. Tap Connection Score → GET /v1/kc/explain/{pair_id} → Top-3 features, CI
3. Explore Path → Graph Path View → Solid/dashed edges, path confidence product
4. Swipe Left → POST /v1/discovery/dismiss → ×0.30 penalty, 30d suppression, 5s undo
5. Kinnect → Bottom sheet relationship selector → POST /v1/kinnections → Status: pending

## 4. Family Tree Navigation
1. Entry: Root Profile → Tap "Tree" tab
2. Initial Load → Neo4j /v1/tree/hierarchy → Render root + direct descendants
3. Tap Branch → Load ancestors/siblings → Render kinship edges (solid=confirmed, dashed=predicted)
4. Geofence trigger → Inject "Nearby: X family members" notification
5. Merge Branch → Upload GEDCOM → Conflict resolution UI → POST /v1/tree/merge

## 5. Room Creation & Recording
1. Tap "+" → Select "Start Gathering"
2. Recipient selector (contacts/Kin) → Optional recording consent modal (majority opt-out)
3. WebRTC signaling → Turn server rotation → Audio/video quality negotiation
4. During call: Record toggle → Server streams to behavioral-service (audit log)
5. End call → Audio transcription (kernel-service async) → Return summary to Memory Box
