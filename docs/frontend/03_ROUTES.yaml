# Route Schema & Deep Linking
Deep link schema, auth guards, step-up intercepts, and fallback routing.
Base scheme: `kinnect://`
All routes require JWT. Step-up routes inject X-Stepup-Auth header.

## Public Routes (No Auth Required)
- `/auth/login` → LoginScreen
- `/auth/signup` → SignupScreen
- `/onboarding` → OnboardingFlow
- `/legal/:doc` → LegalDocumentScreen

## Protected Routes (JWT Required)
- `/line` → LineScreen (tabs: Echoes, Kinnections, Discover)
- `/create` → CreationBottomSheet
- `/tree` → TreeScreen
- `/pulse` → InboxScreen
- `/root` → RootScreen
- `/root/:kin_id` → RootProfileScreen
- `/memory/:memory_id` → MemoryDetailScreen
- `/vault/:memory_id` → VaultDetailScreen (scope:vault:read)
- `/discovery/:candidate_id` → DiscoveryCardScreen
- `/room/:room_id` → RoomsScreen
- `/branch/:branch_id` → BranchScreen

## Step-Up Routes (Additional Auth Required)
- `/memorybox/seal` (reason: vault_write, ttl: 300s, fallback: /vault)
- `/settings/security/revoke-biometric` (reason: account_delete, ttl: 300s)
- `/commerce/checkout/:tier_id` (reason: payment_write, threshold: >$10, ttl: 300s)

## Fallback Routing Rules
- Deep link failure → /line
- Auth expired → /auth/login
- Consent rejected → /settings/privacy
- Offline default → /line?mode=cached
- 404 → /line

## Deep Link Examples
- `kinnect://line` → Home feed
- `kinnect://memory/UUID-123` → Specific memory detail
- `kinnect://tree?branch_id=UUID-456` → Tree with branch selected
- `kinnect://discovery/candidate/UUID-789` → Discovery card
- `https://kinnectai.app/memory/UUID-123` → Web equivalent
