---
# Shell routes, tab structure, conditional modals, deep link resolution
# Lexicon: Use KinnectAI-native terms only. No social network analogues.
navigation:
  shell: MainShell
  tabs:
    - icon: PhosphorIcons.house
      label: "Home"
      route: "/line"
    - icon: PhosphorIcons.arrowCounterClockwise
      label: "Repost"
      route: "/repost"
    - icon: PhosphorIcons.plus
      label: "Create"
      route: "/create"
      type: bottom_sheet
    - icon: PhosphorIcons.treeStructure
      label: "Tree"
      route: "/tree"
    - icon: PhosphorIcons.user
      label: "Root"
      route: "/root"

  modals:
    - id: step_up_auth
      route: "/auth/step-up"
      trigger: any_step_up_route
      dismissible: false
    - id: steward_agreement
      route: "/memorybox/steward"
      trigger: vault_composer_unspoken
    - id: recording_consent
      route: "/rooms/recording-consent"
      trigger: originator_record_toggle
      majority_opt_out: true
    - id: gedcom_conflict
      route: "/tree/gedcom/conflicts/:import_id"
      trigger: dna_ingest_conflict_review

  conditional_routing:
    - condition: "consent_flags & 0x02 == 0"
      action: redirect "/onboarding/dna"
    - condition: "kernel_status == unavailable"
      action: inject "/line?mode=chronological"
    - condition: "att_status == denied"
      action: disable_pixel_tracking + log_analytics_off
