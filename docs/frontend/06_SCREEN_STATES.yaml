---
# Standardized state taxonomy per screen type
# Loading, empty, error, success, offline states
states:
  loading:
    type: skeleton_shimmer
    color: kinnect_accent_amber
    timeout_ms: 8000
    fallback: cached_data

  empty:
    type: illustration + copy + CTA
    copy_rules:
      - no_social_network_terms
      - kinnectai_native_only
    actions:
      - primary: "Invite your first Kin"
      - secondary: "Skip for now"

  error:
    type: banner + retry + contextual_copy
    retry_logic:
      network: exponential_backoff(1s, 2s, 4s, 8s)
      server: 3_attempts(1s, 5s, 15s)
      step_up: 3_attempts_then_lockout_30m
    accessibility: "Error: {user_message}. Tap to retry."

  success:
    type: toast + haptic + state_transition
    timeout_ms: 3000
    animation: emphasisEasing (300ms)

  offline:
    banner: "Offline — showing cached data"
    queue_ui: "Action queued. Will sync when online."
    conflict_banner: "Local draft preserved. Server version differs."
