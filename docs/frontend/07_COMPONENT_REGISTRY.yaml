---
# Design system tokens, reusable UI, motion, and accessibility bindings
components:
  tokens:
    colors:
      kinnect_accent: "#FF6B1A"
      kinnect_primary: "#00C2D4"
      kinnect_text_secondary: "#B0B0D0"
      background: "#0A0A0F"
      surface: "#121218"
    motion:
      durationMicro: 100ms
      durationStandard: 200ms
      durationEmphasis: 300ms
      durationMacro: 500ms
      curves:
        standard: Curves.fastOutSlowIn
        emphasis: Curves.elasticInOut
        decelerate: Curves.decelerate

  reusable:
    - name: KinScoreBadge
      props: score, colorToken, animate
      accessibility: "Kin Score {score}%"
    - name: MemoryCard
      props: memoryId, creator, type, pulseCount, c2paVerified, isRippling
      actions: pulse, comment, rewind, share, branch
    - name: ConsentToggle
      props: bit, hex, copy, defaultState
      accessibility: "Toggle consent for {feature}"
    - name: StepUpModal
      props: reason, ttl, method
      accessibility: "Secure action requires authentication"
    - name: EdgeRenderer
      props: sourceKin, targetKin, confidence, edgeType
      types: [solid_confirmed, dashed_predicted, dotted_pending]
    - name: ZKBadge
      props: memoryId, verificationStatus
      accessibility: "Zero-knowledge sealed. Press to verify."
