---
# REST/GraphQL contract mapping, retry policies, rate limits, DTO validation
bindings:
  feed:
    endpoint: "GET /v1/feed"
    auth: "JWT + scope:feed:read"
    retry: "3x exponential"
    rate_limit: "100/min/user"
    dto: MemoryDTO[] + FeedMetadata
    fallback: ["kc_cached", "chronological", "empty"]
  discovery:
    endpoint: "GET /v1/discovery/weekly"
    auth: "JWT + scope:discovery:read"
    retry: "none (cached)"
    rate_limit: "50/min/user"
    dto: DiscoveryCard[]
    penalty: "POST /v1/discovery/dismiss { candidate_id, penalty: 0.30 }"
  memorybox:
    endpoint: "POST /v1/memorybox"
    auth: "JWT + scope:vault:write + stepup"
    retry: "none (draft preserved)"
    rate_limit: "10/min/user"
    dto: VaultSealedResponse
    zk_flow: true
  rooms:
    endpoint: "POST /v1/rooms"
    auth: "JWT + scope:rooms:write"
    retry: "ICE negotiation fallback"
    rate_limit: "20/min/user"
    ws: "wss://rooms.kinnectai.app/signaling"
  payment:
    endpoint: "POST /v1/webhooks/revenuecat"
    auth: "Server-to-server HMAC"
    retry: "idempotent by event.id"
    polling: "5min fallback"
  graph:
    endpoint: "GET /v1/tree/hierarchy"
    auth: "JWT + scope:graph:read"
    retry: "3x exponential"
    rate_limit: "50/min/user"
    dto: TreeHierarchyDTO
    cache_ttl: "24h"
