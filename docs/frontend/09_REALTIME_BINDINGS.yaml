---
# WebRTC, Kafka/WS, FCM/APNS, heartbeat, live room states
realtime:
  websocket:
    uri: "wss://api.kinnectai.app/ws"
    auth: "JWT in query param ws_token"
    topics:
      - rooms.signaling
      - vault.triggers
      - notification.dispatch
  webrtc:
    config:
      ICECandidateTimeout: 30s
      ICEConnectionTimeout: 45s
      ICEKeepaliveInterval: 15s
      turn_rotation: 3600s (HMAC-SHA1 per RFC 5766)
    fallback: "audio-only after 3 ICE failures"
  push:
    memorybox_delivery: "cannot disable (legal requirement)"
    fallback_chain: ["Push → In-App Pulse → Email → SMS → 24h retry x7"]
    deep_link_matrix: "docs/frontend/NOTIFICATION_SURFACES.yaml"
  heartbeat:
    schedule: "02:00 UTC gen → 06:00 local inject"
    position: "index 0, stickied 4h"
    dedup: "once per calendar day"
  kafka:
    topics:
      - user.events (behavioral service consumes)
      - memory.events (audit trail)
      - room.events (recording state)
