platforms:
  ios:
    min_version: "14.0"
    auth: ["FaceID", "TouchID", "Passkey", "TOTP"]
    biometric_consent_bit: 5
    location_api: "CLLocationManager (max 20 regions)"
    att_gate: true
    push_provider: "APNS (HTTP/2)"
    background_modes: ["audio", "location", "processing", "fetch"]
  android:
    min_sdk: 26
    target_sdk: 34
    auth: ["BiometricPrompt", "Passkey", "TOTP", "SMS_OTP"]
    biometric_consent_bit: 5
    location_api: "GeofencingClient (max 100 regions)"
    att_gate: false
    push_provider: "FCM (HTTP/1.1)"
    background_modes: ["foreground_service", "workmanager", "alarm_manager"]
  web:
    browsers: ["Chrome 90+", "Safari 14+", "Firefox 90+", "Edge 90+"]
    auth: ["Passkey", "TOTP", "Email_OTP", "SMS_OTP"]
    pwa: true
    service_worker: "stale-while-revalidate"
    realtime: ["WebSocket", "WebRTC", "Server-Sent Events"]
  desktop:
    os: ["Windows 10+", "macOS 11+", "Linux (Ubuntu 20+)"]
    electron: false
    native_wrapper: false
    protocol: "HTTPS/TLS 1.3"
compliance_matrix:
  ios: ["ATT", "BIPA", "COPPA", "GDPR", "HIPAA/GINA"]
  android: ["COPPA", "GDPR", "HIPAA/GINA", "BIPA"]
  web: ["GDPR", "COPPA", "CCPA", "BIPA"]
data_residency:
  default: "us-east-1"
  eu_override: "eu-west-1 (consent_bit_1 or region=='EU')"
  apac_override: "ap-south-1 (region=='APAC')"