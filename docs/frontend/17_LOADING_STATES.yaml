loading_states:
  default_skeleton:
    type: "shimmer"
    color: "kinnect_accent_amber"
    opacity: 0.3
    animation: "pulse_linear"
    timeout_ms: 8000
  feed_cards:
    type: "video_placeholder"
    layout: "9:16 aspect ratio"
    elements: ["creator_avatar", "kin_score_badge", "caption_line"]
  graph_nodes:
    type: "network_grid"
    animation: "stagger_fade_in"
    delay_per_node: 50ms
    fallback: "partial_graph_banner"
  vault_composer:
    type: "camera_preview_overlay"
    state: "draft_auto_save_spinner"
    text: "Sealing your Memory…"
  discovery_card:
    type: "card_flip_loader"
    elements: ["video_preview_muted", "connection_score_badge", "relationship_guess"]
  room_grid:
    type: "tile_fade"
    layout: "responsive_grid(2,4,6)"
    timeout: 10s
    fallback: "audio_only_banner"