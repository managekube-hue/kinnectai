---
# CACHE_POLICY.yaml
# Drift + Hive + Redis mirror caching strategies per domain
cache_policy:
  feed_cache:
    backend: "Drift (local)"
    ttl: "24h"
    max_entries: 500
    eviction: "LRU on insert"
    redis_mirror: "yes (for web)"
    invalidation_trigger: "new memory published + 30s debounce"

  graph_cache:
    backend: "Drift (local)"
    ttl: "24h"
    max_entries: 1000
    eviction: "LRU"
    redis_mirror: "yes"
    invalidation_trigger: "branch created/merged + 1m debounce"

  discovery_weekly:
    backend: "Hive (never expires)"
    ttl: "never"
    max_entries: "10 cards"
    eviction: "none (manual refresh only)"
    redis_mirror: "no"
    refresh_trigger: "user explicitly pulls down + every Sunday 00:00 UTC"

  profile_cache:
    backend: "Hive"
    ttl: "7d"
    max_entries: 100
    eviction: "LRU"
    redis_mirror: "no"
    invalidation_trigger: "profile edited + 10s debounce"

  vault_metadata:
    backend: "Hive"
    ttl: "never"
    max_entries: "all (no limit)"
    eviction: "none"
    redis_mirror: "no"
    invalidation_trigger: "memory sealed/unsealed, client-initiated"

  room_state:
    backend: "memory (not persisted)"
    ttl: "session only"
    max_entries: "5 active rooms"
    eviction: "on room exit"
    redis_mirror: "no"
    invalidation_trigger: "participant join/leave"

  settings_cache:
    backend: "Hive"
    ttl: "30d"
    max_entries: 1
    eviction: "on app update"
    redis_mirror: "no"
    invalidation_trigger: "settings screen modified"
