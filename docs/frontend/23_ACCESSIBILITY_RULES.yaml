# ACCESSIBILITY_RULES.md
# WCAG 2.1 AA compliance enforced at component and screen level

## Keyboard Navigation
- **Tab Order:** Logical reading order, never reversed or skipped
- **Focus Trap:** Modals must trap focus; pressing Tab at last element cycles to first
- **Escape Key:** Dismissible modals and bottom sheets respond to Escape
- **No Keyboard Traps:** User can always tab away from interactive elements

## Screen Reader Support
- **Semantic HTML:** Use proper heading hierarchy (h1 > h2 > h3); never skip levels
- **ARIA Labels:** Every icon has `aria-label` or `aria-labelledby`
- **Live Regions:** Status updates use `role="status"` with `aria-live="polite"`
- **Form Accessibility:** `<label>` associated with input via `for` attribute; error messages linked via `aria-describedby`

## Color & Contrast
- **Minimum Contrast:** 4.5:1 for normal text; 3:1 for large text (18px+)
- **Color Not Sole Indicator:** Never convey information by color alone (use icons, text, patterns)
- **Focus Indicator:** 2px minimum outline with 2:1 contrast to background
- **Disabled States:** Visually distinct (e.g., 50% opacity) with sufficient contrast

## Motion & Animation
- **Prefers Reduced Motion:** Respect `prefers-reduced-motion: reduce`; disable complex animations
- **No Autoplay:** Videos, audio, and animations don't autoplay; user must initiate
- **Animation Duration:** Keep animations under 500ms to avoid disorientation

## Text & Readability
- **Font Size:** Minimum 12px for body; 14px recommended for accessibility
- **Line Spacing:** Minimum 1.5× line height for body text
- **Justified Text:** Avoid full justification; left-align only
- **Language Declaration:** HTML `lang` attribute set correctly

## Touch & Mobile Accessibility
- **Touch Target Size:** 48px × 48px minimum; 56px recommended
- **Touch Spacing:** 8px gap between interactive elements
- **No Hover Dependencies:** Essential information not hidden behind hover states
- **Orientation Support:** Content reflows in portrait and landscape

## Errors & Validation
- **Error Identification:** Error messages appear before form submission when possible
- **Error Correction:** Suggestion provided for how to fix input
- **Confirmation:** High-consequence actions (deletions, payments) require confirmation

## Testing & Validation
- **Automated Tools:** Axe, Pa11y, or Lighthouse audit on every screen during development
- **Manual Testing:** Screen reader testing with NVDA (Windows) and VoiceOver (Mac/iOS)
- **User Testing:** Include users with disabilities in UAT before each release
