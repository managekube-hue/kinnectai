---
# RESPONSIVE_RULES.yaml
# Breakpoint-driven layout system for mobile, tablet, desktop, and TV
responsive_rules:
  breakpoints:
    mobile_small: "360px (iPhone SE minimum)"
    mobile: "375px (iPhone standard)"
    mobile_large: "414px (iPhone Max)"
    tablet: "768px (iPad)"
    desktop: "1024px (desktop)"
    desktop_large: "1440px (high-DPI displays)"
    tv: "1920px+ (smart TV, AppleTV, Roku)"

  layout_rules:
    mobile:
      grid_columns: 1
      padding: "16px"
      card_width: "full"
      image_aspect_ratio: "16:9"
      toolbar_position: "bottom"
      font_size_multiplier: "1.0"
    
    tablet:
      grid_columns: 2
      padding: "24px"
      card_width: "calc(50% - 12px)"
      image_aspect_ratio: "4:3"
      toolbar_position: "side"
      font_size_multiplier: "1.05"
    
    desktop:
      grid_columns: 3
      padding: "32px"
      card_width: "calc(33% - 16px)"
      max_width_container: "1200px"
      sidebar_width: "320px"
      font_size_multiplier: "1.1"
    
    tv:
      grid_columns: 4
      padding: "48px"
      card_width: "calc(25% - 20px)"
      max_width_container: "1920px"
      font_size_multiplier: "1.5"
      focus_indicator_size: "8px (larger for TVs)"

  typography_scaling:
    h1: "32px (mobile) → 48px (desktop) → 64px (TV)"
    h2: "24px → 36px → 48px"
    body: "16px → 18px → 20px"
    caption: "12px → 14px → 16px"

  touch_targets:
    mobile: "48px minimum"
    tablet: "48px minimum"
    desktop: "40px (can be smaller with mouse)"
    tv: "88px minimum (remote navigation)"

  performance_optimizations:
    image_sizes: "responsive srcset with 1x, 2x, 3x density variants"
    lazy_loading: "enable for images below fold"
    bundle_splitting: "route-based code splitting for desktop/mobile"
