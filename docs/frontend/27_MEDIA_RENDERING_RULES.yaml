---
# MEDIA_RENDERING_RULES.yaml
# Image optimization, video playback, thumbnail generation
media_rendering_rules:
  image_rendering:
    thumbnail_sizes: ["200px", "400px", "800px", "1600px"]
    thumbnail_format: "webp with jpg fallback"
    lazy_loading: "enabled below fold"
    placeholder_type: "blurred LQIP (low-quality image placeholder)"
    aspect_ratio_enforce: "box-aspect-ratio CSS or Container Queries"
    fallback_display: "skeleton shimmer until loaded"

  video_playback:
    player: "native (iOS) + ExoPlayer (Android) + hls.js (Web)"
    bitrate_adaptation: "ABR (Adaptive Bit Rate) based on network"
    playback_quality: ["360p", "480p", "720p", "1080p"]
    audio_track_selection: "auto + user override"
    closed_captions: "SRT format, user-selectable language"
    poster_image: "first frame or custom thumbnail"
    autoplay_policy: "muted autoplay (iOS 10+, Android 9+)"
    inline_playback: "iOS playsinline attribute required"
    pip_support: "picture-in-picture for iPad/Android tablets"

  gif_rendering:
    format: "auto-convert to WEBP or MP4 for efficiency"
    fallback: "still frame + play icon"
    loop: "infinite loop (no manual stop)"

  svg_rendering:
    sanitization: "go-sanitize library (tree SVGs, family crests)"
    responsive: "viewBox attribute enforced"
    fallback: "rasterized PNG if SVG unsupported"
    size_limit: "max 2MB (prevent DOS)"

  progressive_image_rendering:
    on_scroll: "render high-res images as they enter viewport"
    network_aware: "render lower quality on slow networks (2G/3G)"
    battery_aware: "reduce animation if low battery detected"
    gpu_acceleration: "will-change CSS hint on visible images"

  caching_strategy:
    cdn_ttl: "1 year for versioned assets"
    browser_cache: "Cache-Control: public, max-age=31536000 (versioned)"
    service_worker: "cache-first for images + video thumbnails"
    stale_while_revalidate: "return cached while fetching fresh"
