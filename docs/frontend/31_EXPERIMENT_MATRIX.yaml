---
# EXPERIMENT_MATRIX.yaml
# A/B tests, multivariate experiments, holdout groups
experiment_matrix:
  active_experiments:
    - exp_id: "EXP001_LINE_SORTING"
      name: "Line Feed Sort Order A/B Test"
      hypothesis: "KC ranking increases engagement vs chronological"
      variants:
        - variant_id: "control"
          label: "Chronological (Newest First)"
          allocation: 50
        - variant_id: "treatment"
          label: "KC-Ranked (Best Match First)"
          allocation: 50
      metrics: ["avg_session_duration", "memory_views", "share_count"]
      start_date: "2026-05-01"
      end_date: "2026-05-15"
      target_audience: "all (no restrictions)"
      results: "pending"
    
    - exp_id: "EXP002_ONBOARDING_FLOW"
      name: "Onboarding Step Sequence"
      hypothesis: "DNA-first onboarding increases completion vs surname-first"
      variants:
        - variant_id: "control"
          label: "Surname → DNA → Photo → Invite"
          allocation: 50
        - variant_id: "treatment"
          label: "DNA → Surname → Photo → Invite"
          allocation: 50
      metrics: ["completion_rate", "drop_off_screen", "time_to_activation"]
      start_date: "2026-05-05"
      end_date: "2026-05-22"
      target_audience: "new_signups_only"
      results: "pending"
    
    - exp_id: "EXP003_NOTIFICATION_TIMING"
      name: "Notification Delivery Time"
      hypothesis: "Morning delivery increases open rate vs evening"
      variants:
        - variant_id: "control"
          label: "Default (8am local time)"
          allocation: 50
        - variant_id: "treatment"
          label: "Optimized per user (ML-predicted best time)"
          allocation: 50
      metrics: ["push_open_rate", "deep_link_tap_through", "session_start_within_1h"]
      start_date: "2026-05-10"
      end_date: "2026-06-10"
      target_audience: "opted_in_push"
      results: "pending"

  holdout_groups:
    - group_id: "HOLDOUT_QA"
      percentage: 2
      purpose: "QA testing (never show production experiments)"
    - group_id: "HOLDOUT_EMPLOYEE"
      percentage: 1
      purpose: "Employee accounts excluded from experiments"

  statistical_significance:
    min_sample_size: 10000 per variant
    confidence_interval: 95%
    required_effect_size: 5%
    early_stopping: "if p-value < 0.01 before end date"
