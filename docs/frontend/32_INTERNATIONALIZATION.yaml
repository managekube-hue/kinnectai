---
# INTERNATIONALIZATION.yaml
# i18n support, locale selection, RTL handling
internationalization:
  supported_locales:
    - code: "en-US"
      label: "English (US)"
      default: true
    - code: "en-GB"
      label: "English (UK)"
    - code: "es-ES"
      label: "Spanish (Spain)"
    - code: "es-MX"
      label: "Spanish (Mexico)"
    - code: "fr-FR"
      label: "French (France)"
    - code: "de-DE"
      label: "German (Germany)"
    - code: "it-IT"
      label: "Italian (Italy)"
    - code: "pt-BR"
      label: "Portuguese (Brazil)"
    - code: "ja-JP"
      label: "Japanese"
    - code: "ko-KR"
      label: "Korean"
    - code: "zh-CN"
      label: "Simplified Chinese"
    - code: "zh-TW"
      label: "Traditional Chinese"
    - code: "ar-SA"
      label: "Arabic (Saudi Arabia)"
      rtl: true
    - code: "he-IL"
      label: "Hebrew (Israel)"
      rtl: true

  translation_system:
    provider: "Crowdin (professional translations)"
    file_format: "ARB (Application Resource Bundle)"
    source_locale: "en-US"
    namespace: "kinnectai"
    example: "title: {locale}/common.arb"

  pluralization_rules:
    zero: "{count} items"
    one: "{count} item"
    other: "{count} items"

  date_time_formatting:
    date_format: "localized per locale (e.g., MM/DD/YYYY for US, DD/MM/YYYY for UK)"
    time_format: "12h for US/UK, 24h for others"
    timezone: "user system timezone (not forced)"

  currency_formatting:
    primary_currency: "USD"
    localized_display: "€ for EUR, £ for GBP, etc."
    exchange_rate_source: "OpenExchangeRates API (daily refresh)"

  rtl_handling:
    direction: "flip layout for Arabic, Hebrew"
    icon_handling: "mirror directional icons (arrows, chevrons)"
    text_alignment: "right-align body text"
    logical_properties: "use CSS logical properties (e.g., margin-inline instead of margin-left)"

  client_behavior:
    locale_detection: "user device language → user preference → fallback en-US"
    locale_persistence: "store in UserPreferences (survives app reinstall)"
    content_sync: "request locale from backend per API call"
