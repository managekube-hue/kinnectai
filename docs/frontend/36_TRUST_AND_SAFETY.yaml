trust_and_safety:
  scoring:
    baseline: 0.5
    increments: "+0.10 per verified Kinnection, -0.05 per report"
    discovery_filter: "hidden if trust_score < 0.3"
    visibility: "server-authoritative. Client consumes only."
  graph_poisoning:
    detection: "dna_ingest.quality_score < 0.70 → SYNTHETIC_DNA_FLAG"
    action: "manual review + audit log. Process within 24h."
  impersonation:
    detection: "facial embedding similarity >0.85 to verified Steward/Celebrity"
    action: "4h review for high-confidence matches. Block if confirmed."
  memorialization:
    trigger: "account.status = memorialized (death verified)"
    impact: "read-only. Photoplay restricted to Steward. KMS blocks non-Steward decrypt."
  jurisdiction_routing:
    illinois: "BIPA written consent modal + $1M penalty disclosure. 36mo max retention."
    eu_uk: "GDPR Art. 9 checkbox + DPO link. eu-west-1 residency enforced."
    california: "CCPA/CPRA 'Limit Sensitive Info' toggle visible at creation."
    texas: "CUBI voice consent modal before Voiceprint capture."