# Critical User Flows
## 1. Onboarding → Line Activation
`Welcome → Auth (JWT) → Surname (bit 0 prompt) → DNA optional (bit 1) → Photo (TFLite, bit 5) → Invite Kin (ATT, bit 7) → The Line (Redis ZADD, Heartbeat injected)`
- **Gates:** consent_flags bitmask propagation. Step-up not required until Vault/DNA/Voice.
- **Fallback:** If 0 Kinnections, Heartbeat shows "Invite more Kin". Discovery 1:7 ratio from load 1.

## 2. Memory Box Seal (ZK Flow)
`Composer → Draft auto-save → Trigger select → Steward designate (bit 9) → Step-up auth → Client DEK gen → AES-256-GCM encrypt → S3 presigned PUT → KMS wrap → POST /v1/memorybox → 201 {memory_id, audit_id}`
- **Gates:** Step-up mandatory. `encrypted_dek` NOT NULL constraint. Server never sees plaintext.
- **Fallback:** KMS 503 → ERR_VAULT_SEAL. Draft preserved. Retry 3×.

## 3. Discovery Swipe → Kinnection
`GET /v1/discovery/weekly → 10 cards max → Tap Score (explain modal) → Explore Path (Neo4j resolver) → Kinnect (relationship selector) → POST /v1/kinnections`
- **Gates:** consent_flags & 0x04 for graph sharing. Anti-feedback clamp ≤5%/30d.
- **Fallback:** Dismiss ×0.30 penalty. 5s undo. 30-day suppression.

## 4. Room Join → Recording
`POST /v1/rooms → ICE/TURN → WebRTC grid → Tap Record → Consent modal → Majority check → Session end → 10-min choice (Seal/Publish/Discard)`
- **Gates:** KC privacy gate (5%/10%/25%/50%). Recording majority opt-out aborts.
- **Fallback:** SFU crash → LB reroute + RTP replay <3s. TURN credential refresh <1h.

## 5. Payment → Entitlement Sync
`CommerceCubit → RevenueCat/Stripe → POST /v1/webhooks/revenuecat → Idempotent by event.id → PG entitlements → Redis balance → UI unlock`
- **Gates:** Step-up >$10. Refund 48h if render fails.
- **Fallback:** Polling every 5min if webhook fails. Restore purchases CTA.