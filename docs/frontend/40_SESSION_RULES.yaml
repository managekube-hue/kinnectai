session_rules:
  jwt_lifecycle:
    ttl: 3600s
    refresh: "silent Firebase refresh token. Fallback: re-auth."
    revocation: "<2ms Redis JTI propagation. New JWT issued without revoked tier."
  session_storage:
    type: "in-memory + OS secure enclave"
    persistence: "short-lived cache. Cleared on app termination or logout."
  multi_device:
    max_active: 5
    conflict: "last_write_wins for settings. Feed/graph are server-authoritative."
    visibility: "Settings → Manage Devices → revoke remotely → email alert"
  security:
    idle_timeout: "15m background → step-up re-auth required on resume"
    biometric_gate: "app_open, vault_access, payment_initiate"
    step_up_lockout: "5 fails in 15m → action locked 30m (not account)"