app_lifecycle:
  cold_start:
    target: "<2s"
    steps: "splash → load session → hydrate cache → async fetch → render shell"
  foreground:
    actions: "sync mutation_queue, refresh heartbeat, reconnect WebSocket/WebRTC"
  background:
    actions: "debounce draft save, pause WebRTC, maintain push token, queue analytics"
    timeout: "OS-managed. iOS: ~180s background fetch. Android: WorkManager constraints."
  terminate:
    actions: "clear_sensitive_memory, persist_drift_flush, cancel_pending_network"
  state_restoration:
    ios: "UIApplicationMain + state restoration"
    android: "onSaveInstanceState + ViewModel"
    web: "sessionStorage + SW cache"