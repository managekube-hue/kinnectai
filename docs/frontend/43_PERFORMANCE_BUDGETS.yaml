performance_budgets:
  bundle_size: { mobile: "<15MB", web: "<8MB" }
  memory_usage: { per_screen: "<300MB", peak: "<500MB" }
  fps: { target: 60, drop_allowance: "<1%" }
  tti: { warm_start: "<2.5s", cold_start: "<3.5s" }
  api_latency: { feed_p99: "<100ms", kernel_p99: "<200ms", rooms_join_p99: "<2s" }
  cache_miss: { fallback_timeout: "8s", retry_backoff: "1s, 2s, 4s" }
  monitoring:
    tool: "Firebase Perf + OTel metrics"
    alert: "p99 > SLA threshold for 5m → PagerDuty → #infra-alerts"