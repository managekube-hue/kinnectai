animation_rules:
  tokens:
    durationMicro: 100ms
    durationStandard: 200ms
    durationEmphasis: 300ms
    durationMacro: 500ms
    curveStandard: Curves.fastOutSlowIn
    curveEmphasis: Curves.elasticInOut
    curveDecelerate: Curves.decelerate
  component_rules:
    kin_score_badge: "AnimatedContainer color transition + BoxShadow glow at ≥80%"
    pulse_icon: "AnimatedScale 1.0 → 1.2 → 1.0. Color shift. Haptic: selection"
    memory_seal: "Lottie lock animation → fade to sealed state. Curve: emphasisEasing"
    feed_swipe: "SlideTransition Offset(0,0) → Offset(0,-1). Background scales 0.95 → 1.0"
    room_join: "Staggered fade-in tiles (50ms delay per participant)"
    rippling_badge: "Amber pulse ring loop (600ms). Reduced motion: static badge"
  lint:
    rule: "no_hardcoded_animations"
    enforcement: "CI fails if Duration() or Curve used directly. Must import lib/theme/motion_spec.dart"
  accessibility:
    reduce_motion: "adaptiveDuration = 0ms. Instant state changes. No loops."