route_ownership:
  "/auth/*": { team: "Identity", service: "api-gateway + auth-service", scope: "public" }
  "/onboarding/*": { team: "Onboarding", service: "identity-service + feed-service", scope: "authenticated" }
  "/line": { team: "Feed", service: "feed-service + kernel-service", scope: "authenticated" }
  "/tree/*": { team: "Graph", service: "graph-service (kin-graph)", scope: "authenticated + bit 2" }
  "/discovery/*": { team: "Discovery", service: "discovery-service", scope: "authenticated" }
  "/create/*": { team: "Media", service: "photoplay-service + media-service", scope: "authenticated + bit 5/6" }
  "/vault/*": { team: "Vault", service: "memorybox-service", scope: "authenticated + step-up" }
  "/room/*": { team: "Rooms", service: "rooms-service", scope: "authenticated + rooms:write" }
  "/settings/*": { team: "Platform", service: "identity-service + behavioral-service", scope: "authenticated" }
  "/pulse": { team: "Notifications", service: "notification-service", scope: "authenticated" }
  "/store/*": { team: "Commerce", service: "payment-service", scope: "authenticated" }
  compliance: "All routes guarded by JWT + scope validation + consent_flags bitmask. PRD trace enforced."