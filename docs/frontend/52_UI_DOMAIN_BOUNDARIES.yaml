ui_domain_boundaries:
  auth_domain:
    packages: ["packages/auth-sdk", "apps/mobile/lib/services/auth_service.dart"]
    rules: "No UI logic. JWT issuance, refresh, revocation, step-up orchestration only."
  consent_domain:
    packages: ["packages/consent-engine", "apps/mobile/lib/core/consent/"]
    rules: "Bitmask manipulation, ATT gate, revocation propagation. Never bypassed by UI."
  feed_domain:
    packages: ["apps/mobile/lib/cubits/line_bloc.dart", "apps/web/src/stores/feedStore.ts"]
    rules: "Server-ranked ZSET consumption. ContentTypeBoost applied server-side. No client sort."
  graph_domain:
    packages: ["apps/mobile/lib/repositories/tree_graph_repository.dart"]
    rules: "Neo4j resolver output only. Client never queries Cypher. DataLoader batch enforced."
  vault_domain:
    packages: ["apps/mobile/lib/cubits/memory_box_cubit.dart"]
    rules: "Client-side DEK gen. S3 presigned upload. Server stores wrapped DEK only. ZK enforced."
  media_domain:
    packages: ["apps/mobile/lib/cubits/photoplay_cubit.dart", "packages/shared-contracts/"]
    rules: "TFLite on-device. C2PA embed required for AI. Fallback logic server-determined."
  boundaries: "Cross-domain imports forbidden without facade. CI lint blocks direct service-to-service UI calls."