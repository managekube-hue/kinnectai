# The Line (Home) Structural Wireframe Spec
# PRD §01, SRS §14.1, §41.2
screen: LineScreen
viewport:
  mobile: { width: 393, height: 852 }
  tablet: { width: 744, height: 1133 }
  desktop: { width: 1280, height: 800 }
layout_zones:
  - zone: top_bar
    position: { y: 0, h: 88 }
    components:
      - type: tab_bar
        items: ["Echoes", "Kinnections", "Discover"]
        active: home
      - type: icon_button
        id: bell
        action: navigate("/pulse")
      - type: icon_button
        id: store
        action: navigate("/store")
  - zone: video_canvas
    position: { y: 88, h: "calc(100vh - 200px)" }
    aspect_ratio: 9:16 (mobile), 16:9 (desktop)
    components:
      - type: video_player
        behavior: autoplay_muted, intersecting >60%
      - type: right_rail
        icons: ["pulse", "comment", "rewind", "favorite", "share", "branch"]
        overlay_z: 15
  - zone: bottom_overlay
    position: { y: "canvas_bottom - 140", h: 140 }
    components:
      - type: text
        id: creator_name
        action: navigate("/root/:id")
      - type: badge
        id: kin_score
        color_token: dynamic(≥80: #FF6B1A, 50-79: #00C2D4, <50: #B0B0D0)
      - type: text
        id: caption
        max_lines: 2, expandable: true
      - type: audio_waveform
        id: voiceprint_bar
        action: play_preview
  - zone: bottom_nav
    position: { y: "100vh - 84", h: 84 }
    items: ["Home", "Repost", "Create", "Tree", "Root"]
    active: home
responsive_rules:
  mobile: full_screen_vertical_scroll
  tablet: 2-col_grid, right_rail_inline
  desktop: 3-col_grid, center_canvas_max_width: 480px
accessibility:
  tab_order: top_bar → video → right_rail → bottom_overlay → nav
  screen_reader: "The Line. Creator: {name}. Kin Score: {score}%. Swipe up for next memory."