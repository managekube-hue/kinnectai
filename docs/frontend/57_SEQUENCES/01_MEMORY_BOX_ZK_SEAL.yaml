sequenceDiagram
    participant C as Client (Flutter)
    participant GW as API Gateway
    participant MB as MemoryBox-Service (8090)
    participant KMS as AWS KMS/CloudHSM
    participant S3 as S3 (membox/enc/)
    participant PG as PostgreSQL
    participant KAF as Kafka (vault.triggers)

    Note over C: User taps "Seal Memory" → Step-up auth prompt
    C->>C: Generate 256-bit DEK (Web Crypto)
    C->>C: Encrypt content AES-256-GCM (DEK)
    C->>MB: Request presigned PUT URL
    MB-->>C: 200 { s3_key, url, expires: 900s }
    C->>S3: PUT encrypted_content directly
    S3-->>C: 200 OK
    C->>GW: POST /v1/kms/wrap { dek_plaintext } [mTLS]
    GW->>KMS: Encrypt(KeyId=KEK, Plaintext=DEK)
    KMS-->>GW: { encrypted_dek, dek_key_id }
    GW-->>C: 200 { encrypted_dek, dek_key_id }
    C->>GW: POST /v1/memorybox { recipient_id, trigger_type, trigger_value, content_s3_key, encrypted_dek, dek_key_id, X-Stepup-Auth }
    GW->>MB: Validate JWT scope: vault:write, stepup token, consent_bit_9
    MB->>PG: INSERT vault_memories (encrypted_dek IS NOT NULL CHECK)
    PG-->>MB: 201 { memory_id }
    MB->>KAF: Publish vault.triggers event
    MB-->>GW: 201 { memory_id, trigger_id, audit_log_id }
    GW-->>C: 201 OK
    Note over C: Emit VaultComposerState.sealed. Clear draft. Log audit.