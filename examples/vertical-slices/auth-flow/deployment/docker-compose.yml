// Deployment - Docker Compose for complete auth flow
version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: kinnectai
      POSTGRES_USER: kinnect
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - postgres_data:/var/lib/postgresql/data

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  identity-service:
    build:
      context: ../../../services/go/identity-service
      dockerfile: Dockerfile
    environment:
      ENVIRONMENT: dev
      DATABASE_URL: postgres://kinnect:password@postgres:5432/kinnectai
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKERS: kafka:9092
      LOG_LEVEL: debug
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - kafka
      - redis
    networks:
      - kinnectai

  gateway:
    build:
      context: ../../../services/gateway
      dockerfile: Dockerfile
    environment:
      ENVIRONMENT: dev
      IDENTITY_SERVICE_URL: http://identity-service:8081
      LOG_LEVEL: debug
    ports:
      - "8080:8080"
    depends_on:
      - identity-service
    networks:
      - kinnectai

networks:
  kinnectai:
    driver: bridge

volumes:
  postgres_data:
