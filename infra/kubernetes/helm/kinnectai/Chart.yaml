apiVersion: v2
name: kinnectai
description: KinnectAI microservices platform
type: application
version: 1.0.0
appVersion: "1.0"

dependencies:
  - name: postgresql
    version: "13.x.x"
    repository: "https://charts.bitnami.com/bitnami"
  - name: redis
    version: "18.x.x"
    repository: "https://charts.bitnami.com/bitnami"
  - name: kafka
    version: "26.x.x"
    repository: "https://charts.bitnami.com/bitnami"
  - name: prometheus
