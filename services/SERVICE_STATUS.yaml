# Tier Definitions
tiers:
  critical:
    description: "Service failure blocks core platform operations"
    deployment_frequency: daily
    change_failure_rate: 0.05
    mean_time_to_recovery: 30m
    
  high:
    description: "Service failure impacts user experience or analytics"
    deployment_frequency: daily
    change_failure_rate: 0.10
    mean_time_to_recovery: 60m
    
  medium:
    description: "Service failure impacts non-critical features"
    deployment_frequency: 3x/week
    change_failure_rate: 0.15
    mean_time_to_recovery: 2h
    
  low:
    description: "Service failure has minimal user impact"
    deployment_frequency: weekly
    change_failure_rate: 0.25
    mean_time_to_recovery: 4h

# Maturity Scale (0-100)
maturity_scale:
  0: "Not started"
  5: "Scaffold created"
  10: "Domain layer complete"
  20: "Application + infrastructure layers"
  30: "Integration tests passing"
  40: "Staging deployment ready"
  50: "Production deployment ready"
  60: "Live with basic monitoring"
  70: "SLO targets met"
  80: "Chaos testing passed"
  90: "On-call rotation established"
  100: "Production-grade stable"
